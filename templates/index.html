<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAT1 节点订阅系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .container { max-width: 1200px; }
        .status-card { background-color: #f8f9fa; border-left: 4px solid #0d6efd; }
        .card-header { font-weight: bold; }
        .port-badge { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>NAT1 节点订阅系统</h1>
            <a href="/logout" class="btn btn-outline-danger">登出</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card status-card">
                    <div class="card-header">公网 IP</div>
                    <div class="card-body">
                        <span id="current-ip" class="display-6">加载中...</span>
                        <button class="btn btn-sm btn-outline-secondary ms-3" onclick="refreshStatus()">刷新</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card status-card">
                    <div class="card-header">订阅地址</div>
                    <div class="card-body">
                        <code id="sub-url">http://<span id="hostname"></span>:9998/sub?token=<span id="sub-token"></span></code>
                        <button class="btn btn-sm btn-outline-secondary ms-3" onclick="copySubUrl()">复制</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-12">
                <a href="/router_script" class="btn btn-outline-success">生成路由器脚本</a>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">节点端口状态</div>
                    <div class="card-body" id="port-status">加载中...</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>节点配置 (用户提交)</span>
                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#nodeModal" onclick="openAddModal()">+ 添加节点</button>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered table-hover">
                            <thead>
                                <tr><th>ID</th><th>节点名称</th><th>UUID</th><th>传输协议</th><th>伪装域名</th><th>操作</th> '</thead>
                            <tbody id="nodes-table">...</tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑节点模态框 -->
    <div class="modal fade" id="nodeModal" tabindex="-1" aria-labelledby="nodeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="nodeModalLabel">添加/编辑节点</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="nodeForm">
                        <input type="hidden" id="nodeId" name="id">
                        <div class="mb-3"><label for="nodeName" class="form-label">节点名称 *</label><input type="text" class="form-control" id="nodeName" required></div>
                        <div class="mb-3"><label for="nodeUuid" class="form-label">UUID *</label><input type="text" class="form-control" id="nodeUuid" required></div>
                        <div class="mb-3"><label for="nodeNet" class="form-label">传输协议</label><select class="form-select" id="nodeNet"><option value="ws">ws</option><option value="tcp">tcp</option><option value="kcp">kcp</option><option value="http">http</option></select></div>
                        <div class="mb-3"><label for="nodeHost" class="form-label">伪装域名 (host)</label><input type="text" class="form-control" id="nodeHost"></div>
                        <div class="mb-3"><label for="nodePath" class="form-label">路径 (path)</label><input type="text" class="form-control" id="nodePath" value="/"></div>
                        <div class="mb-3"><label for="nodeTls" class="form-label">TLS</label><select class="form-select" id="nodeTls"><option value="none">none</option><option value="tls">tls</option></select></div>
                        <div class="mb-3"><label for="nodeAid" class="form-label">AlterID</label><input type="text" class="form-control" id="nodeAid" value="0"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveNode()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentEditId = null;
        const hostname = window.location.hostname;
        let subToken = '';

        document.getElementById('hostname').innerText = hostname;
        refreshStatus();
        loadNodes();

        // 获取订阅 token
        fetch('/api/sub_token')
            .then(res => res.json())
            .then(data => {
                subToken = data.token;
                document.getElementById('sub-token').innerText = subToken;
            })
            .catch(err => console.error('获取 token 失败', err));

        async function refreshStatus() {
            try {
                const ipRes = await fetch('/api/status/ip');
                if (ipRes.ok) {
                    const data = await ipRes.json();
                    document.getElementById('current-ip').innerText = data.ip;
                } else document.getElementById('current-ip').innerText = '无法获取';
                const portRes = await fetch('/api/status/ports');
                if (portRes.ok) {
                    const ports = await portRes.json();
                    let html = '<div class="row">';
                    for (const [id, port] of Object.entries(ports)) html += `<div class="col-md-3"><strong>节点 ${id}:</strong> <span class="badge bg-primary port-badge">${port}</span></div>`;
                    html += '</div>';
                    document.getElementById('port-status').innerHTML = html;
                } else document.getElementById('port-status').innerHTML = '无法获取端口状态';
            } catch (e) { console.error(e); }
        }

        async function loadNodes() {
            try {
                const res = await fetch('/api/nodes');
                const nodes = await res.json();
                const tbody = document.getElementById('nodes-table');
                if (nodes.length === 0) { tbody.innerHTML = '...</td></tr>'; return; }
                let html = '';
                for (const node of nodes) {
                    html += `<tr>
                        <td>${node.id}</td>
                        <td>${node.name}</td>
                        <td><code>${node.uuid}</code></td>
                        <td>${node.net || 'ws'}</td>
                        <td>${node.host || '-'}</td>
                        <td><button class="btn btn-sm btn-warning" onclick="editNode(${node.id})">编辑</button> <button class="btn btn-sm btn-danger" onclick="deleteNode(${node.id})">删除</button></td>
                    </tr>`;
                }
                tbody.innerHTML = html;
            } catch (e) { console.error(e); }
        }

        function openAddModal() { currentEditId = null; document.getElementById('nodeId').value = ''; document.getElementById('nodeName').value = ''; document.getElementById('nodeUuid').value = ''; document.getElementById('nodeNet').value = 'ws'; document.getElementById('nodeHost').value = ''; document.getElementById('nodePath').value = '/'; document.getElementById('nodeTls').value = 'none'; document.getElementById('nodeAid').value = '0'; document.getElementById('nodeModalLabel').innerText = '添加节点'; }
        async function editNode(id) {
            try {
                const res = await fetch('/api/nodes');
                const nodes = await res.json();
                const node = nodes.find(n => n.id === id);
                if (node) {
                    currentEditId = id;
                    document.getElementById('nodeId').value = node.id;
                    document.getElementById('nodeName').value = node.name;
                    document.getElementById('nodeUuid').value = node.uuid;
                    document.getElementById('nodeNet').value = node.net || 'ws';
                    document.getElementById('nodeHost').value = node.host || '';
                    document.getElementById('nodePath').value = node.path || '/';
                    document.getElementById('nodeTls').value = node.tls || 'none';
                    document.getElementById('nodeAid').value = node.aid || '0';
                    document.getElementById('nodeModalLabel').innerText = '编辑节点';
                    const modal = new bootstrap.Modal(document.getElementById('nodeModal'));
                    modal.show();
                }
            } catch (e) { console.error(e); }
        }

        async function saveNode() {
            const nodeData = {
                id: parseInt(document.getElementById('nodeId').value) || (currentEditId ? currentEditId : null),
                name: document.getElementById('nodeName').value,
                uuid: document.getElementById('nodeUuid').value,
                net: document.getElementById('nodeNet').value,
                host: document.getElementById('nodeHost').value,
                path: document.getElementById('nodePath').value,
                tls: document.getElementById('nodeTls').value,
                aid: document.getElementById('nodeAid').value
            };
            if (!nodeData.id) {
                const res = await fetch('/api/nodes');
                const nodes = await res.json();
                const maxId = nodes.length ? Math.max(...nodes.map(n => n.id)) : 0;
                nodeData.id = maxId + 1;
            }
            const res = await fetch('/api/node', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nodeData)
            });
            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('nodeModal')).hide();
                loadNodes();
                refreshStatus();
            } else {
                alert('保存失败');
            }
        }

        async function deleteNode(id) {
            if (confirm('确定删除此节点吗？')) {
                const res = await fetch(`/api/node/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadNodes();
                    refreshStatus();
                } else {
                    alert('删除失败');
                }
            }
        }

        function copySubUrl() {
            const url = `http://${hostname}:9998/sub?token=${subToken}`;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(() => {
                    alert('订阅地址已复制');
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            const success = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (success) {
                alert('订阅地址已复制');
            } else {
                alert('复制失败，请手动复制');
            }
        }
    </script>
</body>
</html>
