<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首次设置 - NAT1节点订阅系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 50px; }
        .setup-container { max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="container setup-container">
        <div class="card">
            <div class="card-header">首次安装 - 设置管理员密码</div>
            <div class="card-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                <form method="post">
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirm" name="confirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">设置密码并进入系统</button>
                </form>
                <hr>
                <p class="text-muted small">忘记密码？删除 <code>password.hash</code> 文件即可重置。</p>
            </div>
        </div>
    </div>
</body>
</html>
